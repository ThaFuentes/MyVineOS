{# Single role assignment row - member OR free-text guest speaker (no member required). #}

<div class="input-group mb-3 assignment-row" role="group" aria-label="Role assignment row" style="flex-wrap:wrap; gap:0.35rem;">
    <input type="text"
           name="role_name"
           class="form-control form-control-dark"
           placeholder="e.g. Preacher, Worship Leader, Sound Tech"
           value="{{ assignment.role_name if assignment else '' }}"
           aria-label="Role name"
           style="min-width:140px; flex:1 1 140px;">

    <select name="user_id"
            class="form-select form-control-dark assignment-user-select"
            aria-label="Assigned church member (optional)">
        <option value="">Unassigned / use guest name -></option>
        {% for user in assignable_users %}
            <option value="{{ user.id }}"
                    {% if assignment and assignment.user_id == user.id %}selected{% endif %}>
                {{ user.full_name }} ({{ user.username }})
            </option>
        {% endfor %}
    </select>

    <input type="text"
           name="guest_name"
           class="form-control form-control-dark assignment-guest-name"
           placeholder="Guest name (if not a member)"
           value="{{ assignment.guest_name if assignment and assignment.guest_name else '' }}"
           aria-label="Guest speaker or non-member name"
           style="min-width:160px; flex:1 1 160px;">

    <button type="button"
            class="btn btn-danger remove-role-btn flex-shrink-0"
            aria-label="Remove this role assignment"
            title="Remove role">
        <i class="fas fa-times"></i>
        <span class="visually-hidden">Remove</span>
    </button>
    <small class="text-muted w-100" style="font-size:0.75rem;">
        Leave member Unassigned and type a guest name for guest speakers. Notes on the plan also show on the public welcome page.
    </small>
</div>
