{% extends "volunteers/base_vol.html" %}
{% block title %}Volunteer Settings{% endblock %}

{% block vol_content %}
<div class="glass-panel" style="padding:1.15rem; max-width:520px;">
  <h1 style="margin:0 0 0.75rem; font-size:1.25rem; color:var(--primary);">Reminder settings</h1>
  <form method="post" class="styled-form">
    {% include 'partials/csrf_field.html' %}
    <label style="display:flex;align-items:center;gap:0.4rem;">
      <input type="checkbox" name="reminders_enabled" value="1" {% if settings.reminders_enabled %}checked{% endif %}>
      Send automated email reminders
    </label>
    <label>Days before event
      <input type="number" name="reminder_days" class="form-input" value="{{ settings.reminder_days }}" min="0" max="30">
    </label>
    <label style="display:flex;align-items:center;gap:0.4rem;">
      <input type="checkbox" name="auto_notify" value="1" {% if settings.auto_notify %}checked{% endif %}>
      Email invite automatically when someone is assigned
    </label>
    <p style="font-size:0.85rem; opacity:0.7;">
      Reminders run with the church email scheduler
      (<code>scripts/run_scheduled_emails.py</code> or hub “due jobs”).
    </p>
    <button type="submit" class="btn btn-primary">Save</button>
  </form>
</div>
{% endblock %}
