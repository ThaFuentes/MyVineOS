<!-- WebChurchMan/app/templates/prophecies/edit_prophecy.html -->
<!-- Full path: WebChurchMan/app/templates/prophecies/edit_prophecy.html -->
<!-- File name: edit_prophecy.html -->
<!-- Brief, detailed purpose: Edit existing Prophecy (private side – for logged-in users/admins) -->

{% extends "prophecies/base_prophecies.html" %}

{% block page_title %}Edit Prophecy{% endblock %}

{% block page_description %}
Edit your prophecy below. You can change the title, content, or visibility.
{% endblock %}

{% block prophecies_content %}

<section class="content-section">
    <h2 class="section-title">Edit Prophecy</h2>

    <form method="POST" action="{{ url_for('prophecies.edit_prophecy', prophecy_id=prophecy.id) }}" class="styled-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">

        <div class="form-group">
            <label for="title" class="control-label">Title <span class="required">*</span></label>
            <input type="text" id="title" name="title" class="form-input" required
                   value="{{ prophecy.title }}">
        </div>

        <div class="form-group">
            <label for="description" class="control-label">Prophecy <span class="required">*</span></label>
            <textarea id="description" name="description" rows="12" class="form-input" required>
{{ prophecy.description }}
</textarea>
        </div>

        <div class="form-group">
            <label for="visibility" class="control-label">Visibility <span class="required">*</span></label>
            <select id="visibility" name="visibility" class="form-input" required>
                <option value="public"  {% if prophecy.visibility == 'public' %}selected{% endif %}>Public – visible to everyone</option>
                <option value="private" {% if prophecy.visibility == 'private' %}selected{% endif %}>Private – visible to logged-in members only</option>
                <option value="personal"{% if prophecy.visibility == 'personal' %}selected{% endif %}>Personal – visible only to you</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Save Changes</button>
            <a href="{{ url_for('prophecies.list_prophecies') }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</section>

{% endblock %}
