{# Shared public bottom nav — mobile bar matching homepage #}
{% set ep = request.endpoint or '' %}
<nav class="bottom-nav" aria-label="Public navigation">
  {% if session.get('user_id') %}
  <a href="{{ url_for('dashboard.dashboard') }}" class="{{ 'active' if ep == 'dashboard.dashboard' else '' }}">
    <span class="icon"><i class="fa-solid fa-house" aria-hidden="true"></i></span>
    <span class="label">Home</span>
  </a>
  <a href="{{ url_for('public.public_dashboard.public_community') }}" class="{{ 'active' if ep == 'public.public_dashboard.public_community' else '' }}">
    <span class="icon"><i class="fa-solid fa-users" aria-hidden="true"></i></span>
    <span class="label">Feed</span>
  </a>
  {% else %}
  <a href="{{ url_for('public.public_dashboard.public_dashboard') }}" class="{{ 'active' if ep in ('auth.auth_index', 'public.public_dashboard.public_dashboard') else '' }}">
    <span class="icon"><i class="fa-solid fa-house" aria-hidden="true"></i></span>
    <span class="label">Welcome</span>
  </a>
  {% endif %}
  <a href="{{ url_for('bible.member_study') }}" class="{{ 'active' if ep.startswith('bible.') else '' }}">
    <span class="icon"><i class="fa-solid fa-scroll" aria-hidden="true"></i></span>
    <span class="label">Bible</span>
  </a>
  <a href="{{ url_for('public.public_events.public_events') }}" class="{{ 'active' if ep.startswith('public.public_events') else '' }}">
    <span class="icon"><i class="fa-solid fa-calendar-days" aria-hidden="true"></i></span>
    <span class="label">Events</span>
  </a>
  <a href="{{ url_for('public.public_prayers.public_prayers') }}" class="{{ 'active' if ep.startswith('public.public_prayers') else '' }}">
    <span class="icon"><i class="fa-solid fa-hands-praying" aria-hidden="true"></i></span>
    <span class="label">Prayers</span>
  </a>
  <a href="{{ url_for('public.public_sermons.public_sermons') }}" class="{{ 'active' if ep.startswith('public.public_sermons') else '' }}">
    <span class="icon"><i class="fa-solid fa-book-open" aria-hidden="true"></i></span>
    <span class="label">Sermons</span>
  </a>
  <a href="{{ url_for('public.public_announcements.public_announcements') }}" class="{{ 'active' if ep.startswith('public.public_announcements') else '' }}">
    <span class="icon"><i class="fa-solid fa-bullhorn" aria-hidden="true"></i></span>
    <span class="label">Announce</span>
  </a>
  {% if not session.get('user_id') %}
  <a href="{{ url_for('auth.login') }}" class="{{ 'active' if ep in ('auth.login', 'auth.register') else '' }}">
    <span class="icon"><i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i></span>
    <span class="label">Login</span>
  </a>
  {% endif %}
</nav>
