{# Shared sub-nav for Profile, Help, Settings — visible on mobile where bottom nav only lands on Profile #}
{% set ep = request.endpoint or '' %}
<nav aria-label="My Stuff sections" style="display:flex; gap:0.5rem; flex-wrap:wrap; background:var(--bg-card, #252525); border:1px solid var(--primary-border, rgba(0,255,255,0.15)); border-radius:12px; padding:0.4rem; margin-bottom:0.75rem;">
    <a href="{{ url_for('profile.profile') }}"
       style="padding:0.35rem 0.85rem; border-radius:9999px; text-decoration:none; font-size:0.9rem; {% if ep.startswith('profile.') %}background:var(--primary); color:var(--text-on-primary);{% else %}background:rgba(255,255,255,0.06); color:var(--text-primary);{% endif %}">Profile</a>
    <a href="{{ url_for('help.help_index') }}"
       style="padding:0.35rem 0.85rem; border-radius:9999px; text-decoration:none; font-size:0.9rem; {% if ep.startswith('help.') %}background:var(--primary); color:var(--text-on-primary);{% else %}background:rgba(255,255,255,0.06); color:var(--text-primary);{% endif %}">Help</a>
    <a href="{{ url_for('settings.general') }}"
       style="padding:0.35rem 0.85rem; border-radius:9999px; text-decoration:none; font-size:0.9rem; {% if ep.startswith('settings.') %}background:var(--primary); color:var(--text-on-primary);{% else %}background:rgba(255,255,255,0.06); color:var(--text-primary);{% endif %}">Settings</a>
</nav>
