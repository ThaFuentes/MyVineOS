{% extends "auth/base_auth.html" %}
{% block title %}Resend Verification{% endblock %}
{% block content %}
<div class="glass-panel" style="max-width:420px; margin:2rem auto; padding:1.5rem;">
    <h2>Resend verification email</h2>
    <p>Enter the email you used when registering. We'll send a new verification link.</p>
    <form method="post" class="styled-form">
        {% include 'partials/csrf_field.html' %}
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required>
        </div>
        <button type="submit" class="btn-primary">Send link</button>
        <a href="{{ url_for('auth.login') }}" class="btn-secondary">Back to login</a>
    </form>
</div>
{% endblock %}
