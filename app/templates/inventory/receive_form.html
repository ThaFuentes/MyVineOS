<!-- app/templates/inventory/receive_form.html -->
<!-- Full path: WebChurchMan/app/templates/inventory/receive_form.html -->
<!-- File name: receive_form.html -->
<!-- Brief, detailed purpose: Form to receive/restock items into a location (new batch). -->

{% extends "inventory/base_inventory.html" %}

{% block inventory_content %}
<section class="content-section">
    <h2 class="section-title">Receive Stock</h2>

    <form method="POST" class="styled-form">
        <div class="form-group">
            <label>Item <span class="required">*</span></label>
            <select name="item_id" required class="form-input">
                {% for item in items %}
                    <option value="{{ item.id }}">{{ item.name }} (Current: {{ item.total_stock|default(0) }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Location <span class="required">*</span></label>
            <select name="location_id" required class="form-input">
                {% for loc in locations %}
                    <option value="{{ loc.id }}">{{ loc.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Quantity Received <span class="required">*</span></label>
            <input type="number" name="quantity" min="1" required class="form-input">
        </div>

        <!-- Add optional fields: purchase_date, expiration_date, cost_per_unit, notes -->

        <div class="form-actions">
            <button type="submit" class="btn-primary">Record Receipt</button>
            <a href="{{ url_for('inventory.inventory_dashboard') }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
